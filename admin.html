<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Admin Upload CSV - Esam Kora</title>
<style>
body {
    font-family: Arial;
    direction: rtl;
    text-align: center;
    background: linear-gradient(135deg,#141e30,#243b55);
    color: white;
}
.container {
    margin: 50px auto;
    background: rgba(255,255,255,0.1);
    padding: 20px;
    border-radius: 15px;
    width: 90%;
    max-width: 500px;
}
input, button {
    width: 90%;
    padding: 10px;
    margin: 5px;
    border-radius: 10px;
    border: none;
}
button {
    background: #00c6ff;
    color: white;
    cursor: pointer;
}
</style>
</head>
<body>

<div class="container">
    <h2>رفع ملف CSV للطلاب</h2>
    <input type="file" id="csvFile" accept=".csv">
    <br>
    <button onclick="uploadCSV()">رفع الملف</button>
    <p id="msg"></p>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCMgXqovKaA6ylpM_3mq6zUAWyrhbA1m2M",
  authDomain: "students-31340.firebaseapp.com",
  projectId: "students-31340",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.uploadCSV = async function() {
    const fileInput = document.getElementById("csvFile");
    const file = fileInput.files[0];
    const msg = document.getElementById("msg");

    if (!file) {
        msg.innerText = "❌ اختر ملف CSV أولاً";
        return;
    }

    msg.innerText = "⏳ جاري رفع البيانات...";

    const text = await file.text();
    const rows = text.split("\n").map(r => r.trim()).filter(r => r);
    const headers = rows[0].split(",");

    try {
        for (let i = 1; i < rows.length; i++) {
            const values = rows[i].split(",");
            let student = {
                seat: values[0],
                name: values[1],
                grade: values[2],
                subjects: {}
            };

            let total = 0;
            for (let j = 3; j < headers.length; j++) {
                let sub = headers[j].trim();
                let deg = parseInt(values[j]) || 0;
                student.subjects[sub] = deg;
                total += deg;
            }

            student.total = total;
            student.status = total >= 140 ? "ناجح" : "راسب"; // من 280

            await addDoc(collection(db, "students"), student);
        }

        msg.innerText = "✅ تم رفع جميع الطلاب بنجاح!";
    } catch (e) {
        msg.innerText = "❌ خطأ أثناء الرفع: " + e;
    }
}
</script>

</body>
</html>
