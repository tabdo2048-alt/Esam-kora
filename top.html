<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Admin - أوائل Esam Kora</title>
<style>
body { font-family: Arial; direction: rtl; text-align: center; background: linear-gradient(135deg,#141e30,#243b55); color: white; }
.container { margin: 50px auto; background: rgba(255,255,255,0.1); padding: 20px; border-radius: 15px; width: 90%; max-width: 500px; }
input, select, button { width: 90%; padding: 10px; margin: 5px; border-radius: 10px; border: none; }
button { background: #00c6ff; color: white; cursor: pointer; }
</style>
</head>
<body>

<!-- 🔐 Login -->
<div class="container" id="loginBox">
    <h2>تسجيل دخول الأدمن</h2>
    <input type="email" id="email" placeholder="Email">
    <input type="password" id="password" placeholder="Password">
    <button onclick="login()">دخول</button>
    <p id="loginMsg"></p>
</div>

<!-- 🧠 Admin Panel -->
<div class="container" id="adminPanel" style="display:none;">
    <h2>لوحة التحكم - إضافة أوائل</h2>

    <button onclick="logout()">تسجيل خروج</button>

    <select id="grade">
        <option value="1">الصف الأول</option>
        <option value="2">الصف الثاني</option>
    </select>

    <input type="text" id="seat" placeholder="رقم الجلوس">
    <input type="text" id="name" placeholder="اسم الطالب">

    <input type="number" id="math" placeholder="رياضيات">
    <input type="number" id="physics" placeholder="فيزياء">
    <input type="number" id="chemistry" placeholder="كيمياء">
    <input type="number" id="arabic" placeholder="عربي">
    <input type="number" id="english" placeholder="إنجليزي">
    <input type="number" id="integrated" placeholder="علوم متكاملة">

    <button onclick="addTopStudent()">إضافة الطالب</button>
    <p id="msg"></p>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyCMgXqovKaA6ylpM_3mq6zUAWyrhbA1m2M",
  authDomain: "students-31340.firebaseapp.com",
  projectId: "students-31340",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

// 🔐 تسجيل الدخول
window.login = function() {
    let email = document.getElementById("email").value;
    let password = document.getElementById("password").value;

    signInWithEmailAndPassword(auth, email, password)
    .catch(() => {
        document.getElementById("loginMsg").innerText = "❌ بيانات غلط";
    });
}

// 🔄 متابعة حالة تسجيل الدخول
onAuthStateChanged(auth, (user) => {
    if (user) {
        document.getElementById("loginBox").style.display = "none";
        document.getElementById("adminPanel").style.display = "block";
    } else {
        document.getElementById("loginBox").style.display = "block";
        document.getElementById("adminPanel").style.display = "none";
    }
});

// 🚪 تسجيل خروج
window.logout = function() {
    signOut(auth);
}

// ➕ إضافة طالب للأوائل
window.addTopStudent = async function() {
    let seat = document.getElementById("seat").value.trim();
    let name = document.getElementById("name").value.trim();
    let grade = document.getElementById("grade").value;

    let subjects = {
        math: Number(document.getElementById("math").value),
        physics: Number(document.getElementById("physics").value),
        chemistry: Number(document.getElementById("chemistry").value),
        arabic: Number(document.getElementById("arabic").value),
        english: Number(document.getElementById("english").value),
        integrated: Number(document.getElementById("integrated").value)
    };

    // حساب المجموع للمواد الموجودة فقط
    let total = 0;
    for (let sub in subjects) {
        if (!isNaN(subjects[sub]) && subjects[sub] > 0) total += subjects[sub];
        else subjects[sub] = undefined;
    }

    let status = total >= 210 ? "ناجح" : "راسب";

    let colName = grade === "1" ? "top1" : "top2";

    try {
        await addDoc(collection(db, colName), {
            seat, name, grade, subjects, total, status
        });
        document.getElementById("msg").innerText = "✅ تم الإضافة للأوائل";
    } catch (e) {
        document.getElementById("msg").innerText = "❌ خطأ: " + e;
    }
}
</script>
</body>
</html>
