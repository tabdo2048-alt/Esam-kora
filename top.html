<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>أوائل مدرسة Esam Kora</title>
<style>
body {
    font-family: Arial;
    direction: rtl;
    text-align: center;
    background: linear-gradient(135deg,#141e30,#243b55);
    color: white;
}
.container {
    margin: 50px auto;
    width: 90%;
    max-width: 800px;
}
table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 20px;
    background: rgba(255,255,255,0.1);
}
th, td {
    padding: 12px;
    border: 1px solid white;
}
th {
    background: rgba(0,198,255,0.7);
}
</style>
</head>
<body>

<div class="container">
    <h1>أوائل مدرسة Esam Kora</h1>
    <table id="topTable">
        <thead>
            <tr>
                <th>الترتيب</th>
                <th>اسم الطالب</th>
                <th>رقم الجلوس</th>
                <th>الصف</th>
                <th>المجموع</th>
                <th>الحالة</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>
</div>

<!-- Firebase -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCMgXqovKaA6ylpM_3mq6zUAWyrhbA1m2M",
  authDomain: "students-31340.firebaseapp.com",
  projectId: "students-31340",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

async function showTop() {
    let querySnapshot = await getDocs(collection(db, "students"));
    let students = [];

    querySnapshot.forEach(doc => {
        students.push(doc.data());
    });

    // ترتيب الطلاب حسب المجموع تنازلي
    students.sort((a,b) => b.total - a.total);

    // عرض أعلى 10
    let top10 = students.slice(0, 10);

    let tbody = document.querySelector("#topTable tbody");
    tbody.innerHTML = "";

    top10.forEach((stu, index) => {
        let row = `<tr>
            <td>${index+1}</td>
            <td>${stu.name}</td>
            <td>${stu.seat}</td>
            <td>${stu.grade}</td>
            <td>${stu.total}</td>
            <td>${stu.status}</td>
        </tr>`;
        tbody.innerHTML += row;
    });
}

showTop();
</script>

</body>
</html>
